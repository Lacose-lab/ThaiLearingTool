<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Kru Noi — Thai Learning</title>
  <meta name="theme-color" content="#d4af37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kru Noi">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
  <!-- Icon sprite -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <symbol id="i-home" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 L12 4 L20 11"/><path d="M6 10 V20 H18 V10"/><path d="M10 20 V14 H14 V20"/></g></symbol>
      <symbol id="i-book" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5 C6 5, 9 5.5, 12 7 C15 5.5, 18 5, 21 5 L21 19 C18 19, 15 19.5, 12 21 C9 19.5, 6 19, 3 19 Z"/><path d="M12 7 V21"/></g></symbol>
      <symbol id="i-lotus" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5 C10 9, 10 13, 12 17 C14 13, 14 9, 12 5 Z"/><path d="M6 9 C6 13, 8.5 16, 12 17 C11 13, 9 10, 6 9 Z"/><path d="M18 9 C18 13, 15.5 16, 12 17 C13 13, 15 10, 18 9 Z"/><path d="M4 14 C6 17, 9 18.5, 12 18.5 C15 18.5, 18 17, 20 14"/></g></symbol>
      <symbol id="i-review" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 A7 7 0 0 1 18.5 9"/><path d="M18.5 5 V9 H14.5"/><path d="M19 12 A7 7 0 0 1 5.5 15"/><path d="M5.5 19 V15 H9.5"/></g></symbol>
      <symbol id="i-chat" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 H20 V16 H13 L9 20 V16 H4 Z"/><circle cx="9" cy="11" r="0.8" fill="currentColor"/><circle cx="12" cy="11" r="0.8" fill="currentColor"/><circle cx="15" cy="11" r="0.8" fill="currentColor"/></g></symbol>
      <symbol id="i-profile" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20 C5 16, 8 14, 12 14 C16 14, 19 16, 19 20"/></g></symbol>
      <symbol id="i-audio" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10 H8 L13 6 V18 L8 14 H4 Z"/><path d="M16 9 C17.5 11, 17.5 13, 16 15"/><path d="M18.5 7 C21 10, 21 14, 18.5 17"/></g></symbol>
      <symbol id="i-check" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 L10 17.5 L19 7.5"/></g></symbol>
      <symbol id="i-close" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6 L18 18 M18 6 L6 18"/></g></symbol>
      <symbol id="i-star" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L14.5 9 L21 9.5 L16 13.5 L17.5 20 L12 16.5 L6.5 20 L8 13.5 L3 9.5 L9.5 9 Z"/></g></symbol>
      <symbol id="i-flame" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 C13 7, 17 9, 17 14 A5 5 0 0 1 7 14 C7 11, 9 10, 10 7 C11 9, 12 9, 12 7"/></g></symbol>
      <symbol id="i-sync" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12 A8 8 0 0 1 19.5 8"/><path d="M19.5 4 V8 H15.5"/><path d="M20 12 A8 8 0 0 1 4.5 16"/><path d="M4.5 20 V16 H8.5"/></g></symbol>
    </defs>
  </svg>

  <div id="app">
    <main id="content"></main>
    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="home">
        <svg><use href="#i-home"/></svg><span>Home</span>
      </button>
      <button class="nav-btn" data-tab="flashcards">
        <svg><use href="#i-book"/></svg><span>Cards</span>
      </button>
      <button class="nav-btn" data-tab="quiz">
        <svg><use href="#i-lotus"/></svg><span>Practice</span>
      </button>
      <button class="nav-btn" data-tab="typing">
        <svg><use href="#i-review"/></svg><span>Review</span>
      </button>
      <button class="nav-btn" data-tab="tutor">
        <svg><use href="#i-chat"/></svg><span>Teacher</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <svg><use href="#i-profile"/></svg><span>Profile</span>
      </button>
    </nav>
  </div>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
